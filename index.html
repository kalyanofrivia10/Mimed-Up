<script>
    let db = JSON.parse(localStorage.getItem('v_stone_v9')) || { folders: ["General"], active: "General", items: [] };

    function render() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        document.getElementById('folder-list').innerHTML = db.folders.map(f => `
            <div class="folder-tab ${db.active === f ? 'active-f' : ''}" onclick="setFolder('${f}')">${f}</div>
        `).join('');
        const filtered = db.items.filter(i => (i.f === db.active) && i.txt.toLowerCase().includes(searchTerm));
        document.getElementById('main-grid').innerHTML = filtered.map(item => `
            <div class="card">
                <img src="${item.img}" ontouchstart="startP('${item.id}')" ontouchend="endP()">
                <textarea class="info-input" oninput="autoGrow(this); updateText('${item.id}', this.value)">${item.txt}</textarea>
            </div>
        `).join('');
        document.querySelectorAll('.info-input').forEach(autoGrow);
    }

    // BETTER BACKUP: Copies text but also handles errors
    function copyBackup() {
        const data = JSON.stringify(db);
        navigator.clipboard.writeText(data).then(() => {
            alert("SUCCESS: Full data (with images) copied. Paste it into a New File in Acode and save it!");
        }).catch(err => alert("Error copying. Your database might be too large for the clipboard."));
    }

    // BETTER RESTORE: Uses a dedicated screen area instead of a prompt
    function importBackup() {
        const overlay = document.createElement('div');
        overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; padding:20px; box-sizing:border-box; display:flex; flex-direction:column;";
        overlay.innerHTML = `
            <h3 style="margin-top:0">Paste Backup Text Below:</h3>
            <textarea id="importArea" style="flex-grow:1; width:100%; border:1px solid #ccc; font-size:10px; margin-bottom:10px;"></textarea>
            <div style="display:flex; gap:10px;">
                <button id="confirmImport" style="flex:1; padding:15px; background:var(--stone); color:white; border:none; border-radius:8px;">IMPORT EVERYTHING</button>
                <button id="cancelImport" style="flex:1; padding:15px; background:#ccc; border:none; border-radius:8px;">CANCEL</button>
            </div>
        `;
        document.body.appendChild(overlay);

        document.getElementById('confirmImport').onclick = () => {
            const rawData = document.getElementById('importArea').value.trim();
            try {
                const parsed = JSON.parse(rawData);
                if (parsed.items) {
                    db = parsed;
                    save();
                    render();
                    document.body.removeChild(overlay);
                    alert("RESORE COMPLETE! Your images are back.");
                }
            } catch (e) {
                alert("STILL INVALID: The text you pasted is incomplete. Make sure you copied the ENTIRE file from Acode (Use 'Select All').");
            }
        };
        document.getElementById('cancelImport').onclick = () => document.body.removeChild(overlay);
    }

    function processImage(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 400 / img.width; 
                canvas.width = 400; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                db.items.push({ id: Date.now().toString(), f: db.active, img: canvas.toDataURL('image/jpeg', 0.5), txt: "" });
                save(); render();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function autoGrow(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function updateText(id, val) { const idx = db.items.findIndex(i => i.id === id); if(idx > -1) { db.items[idx].txt = val; save(); } }
    function setFolder(n) { db.active = n; save(); render(); }
    function newFolder() { const n = prompt("Folder Name:"); if(n) { db.folders.push(n); db.active = n; save(); render(); } }
    function save() { localStorage.setItem('v_stone_v9', JSON.stringify(db)); }
    let pTimer;
    function startP(id) { pTimer = setTimeout(() => { if(confirm("Delete?")) { db.items = db.items.filter(i => i.id !== id); save(); render(); } }, 800); }
    function endP() { clearTimeout(pTimer); }
    render();
</script>
